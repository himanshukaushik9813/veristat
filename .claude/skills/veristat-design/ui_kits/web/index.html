<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veristat — Trust, verified with money.</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { background: var(--surface-0); }
  a:hover { text-decoration: none; opacity: 0.85; }
  table a:hover { text-decoration: underline; opacity: 1; }
  tbody tr:hover { background: var(--surface-2); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 6px; }

  /* ---- hero: build up bottom-to-top, layer by layer ---- */
  .vs-hero-art { will-change: clip-path; filter: grayscale(1) contrast(1.08) brightness(0.92); }
  .vs-hero-grid {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 44px 44px;
    -webkit-mask-image: linear-gradient(90deg, #000 55%, transparent 92%);
    mask-image: linear-gradient(90deg, #000 55%, transparent 92%);
  }
  .vs-hero-scan {
    position: absolute; left: 0; right: 0; height: 160px; pointer-events: none; opacity: 0;
    background: linear-gradient(to top, rgba(255,255,255,0) 0%, rgba(255,255,255,0.22) 50%, rgba(255,255,255,0) 100%);
    mix-blend-mode: screen;
  }
  @media (prefers-reduced-motion: no-preference) {
    .vs-hero-art {
      /* stepped reveal → 7 discrete bands read as the tower's plates snapping in */
      animation: vs-hero-reveal 2.1s steps(7) both;
    }
    .vs-hero-scan {
      /* a glow band glides up ahead of the reveal edge */
      animation: vs-hero-scan 2.2s cubic-bezier(0.4,0,0.2,1) both;
    }
  }
  @keyframes vs-hero-reveal {
    0%   { clip-path: inset(100% 0 0 0); opacity: 0; }
    8%   { opacity: 1; }
    100% { clip-path: inset(0 0 0 0); opacity: 1; }
  }
  @keyframes vs-hero-scan {
    0%   { top: 100%; opacity: 0; }
    12%  { opacity: 0.9; }
    88%  { opacity: 0.9; }
    100% { top: -160px; opacity: 0; }
  }

  /* ---- pipeline: a single pulse travels the row and lights each tile as it passes ---- */
  .vs-pipe-rail {
    position: absolute; left: 3%; right: 3%; bottom: 45.5px; height: 1px; pointer-events: none;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22) 12%, rgba(255,255,255,0.22) 88%, transparent);
  }
  .vs-pipe-dot {
    position: absolute; bottom: 41.5px; width: 9px; height: 9px; margin-left: -4.5px; border-radius: 50%;
    pointer-events: none; opacity: 0; background: #ffffff;
    box-shadow: 0 0 10px 2px rgba(255,255,255,0.9), 0 0 26px 6px rgba(255,255,255,0.5), -22px 0 22px 2px rgba(255,255,255,0.22);
  }
  .vs-pipe-flare { opacity: 0; }
  @media (prefers-reduced-motion: no-preference) {
    .vs-pipe-dot { animation: vs-pulse-travel 4.8s linear infinite; }
    .vs-pipe-flare { animation: vs-pipe-flare 4.8s ease-out infinite; }
    .vs-pipe-tile { animation: vs-pipe-pop 4.8s ease-out infinite; }
  }
  @keyframes vs-pulse-travel {
    0%   { left: 2%; opacity: 0; }
    4%   { opacity: 1; }
    56%  { left: 98%; opacity: 1; }
    63%  { left: 98%; opacity: 0; }
    100% { left: 98%; opacity: 0; }
  }
  @keyframes vs-pipe-flare {
    0%   { opacity: 0; }
    3%   { opacity: 0.95; }
    14%  { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes vs-pipe-pop {
    0%   { transform: scale(1); }
    3%   { transform: scale(1.05); }
    14%  { transform: scale(1); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="docs.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
</body>
</html>
