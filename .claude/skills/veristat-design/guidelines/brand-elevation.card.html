<!-- @dsCard group="Brand" viewport="700x160" name="Elevation & Glow" subtitle="Hairline surfaces lit from within by accent glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-0); display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .card { width: 150px; height: 88px; border-radius: 10px; background: var(--surface-1); border: 1px solid var(--border);
          display: flex; align-items: flex-end; padding: 10px; }
  .lbl { font: 10px var(--font-mono); color: var(--text-muted); }
  .glow { box-shadow: 0 0 24px rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.35); }
  .anchor { border: 1px solid transparent; border-radius: 10px;
    background: linear-gradient(var(--surface-1), var(--surface-1)) padding-box,
                linear-gradient(90deg, rgba(255,255,255,0.5), rgba(255,255,255,0.14), rgba(255,255,255,0.4)) border-box; }
</style>
</head>
<body>
  <div class="card"><span class="lbl">flat card · shadow-card</span></div>
  <div class="card glow"><span class="lbl">accent glow</span></div>
  <div class="card anchor"><span class="lbl">gradient border · anchor bar</span></div>
</body>
</html>
