<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--surface-0); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .sw { width: 122px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 56px; }
  .meta { padding: 7px 10px; background: var(--surface-1); }
  .name { font: 600 12px var(--font-sans); color: var(--text-primary); }
  .val { font: 11px var(--font-mono); color: var(--text-muted); margin-top: 2px; }
  .grad { width: 258px; height: 56px; border-radius: 10px; border: 1px solid var(--border);
          background: linear-gradient(96deg, #ffffff 0%, #d0d1d5 52%, #8f9096 100%);
          box-shadow: 0 0 18px rgba(255,255,255,0.12); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent);box-shadow:0 0 20px rgba(255,255,255,0.35) inset"></div><div class="meta"><div class="name">accent</div><div class="val">#ffffff</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-dim)"></div><div class="meta"><div class="name">accent-dim</div><div class="val">#3c3d42</div></div></div>
    <div class="grad" title="hero headline gradient"></div>
  </div>
</body>
</html>
