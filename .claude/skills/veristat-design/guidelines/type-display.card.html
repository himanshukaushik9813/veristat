<!-- @dsCard group="Type" viewport="700x180" name="Display & Headings" subtitle="System sans, tight tracking, gradient accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface-0); }
  .hero { font: 700 46px/1.02 var(--font-sans); letter-spacing: -0.03em; color: var(--text-primary); margin: 0 0 14px; }
  .hero .accent { background: linear-gradient(96deg, #ffffff, #d0d1d5 52%, #8f9096); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .h1 { font: 700 24px var(--font-sans); letter-spacing: -0.02em; color: var(--text-primary); margin: 0 0 6px; }
  .h2 { font: 700 17px var(--font-sans); color: var(--text-primary); margin: 0; }
  .tag { font: 11px var(--font-mono); color: var(--text-muted); margin-left: 10px; }
</style>
</head>
<body>
  <div class="hero">Trust, <span class="accent">verified</span> with money.</div>
  <div class="h1">Agent service leaderboard <span class="tag">h1 · 24px / -0.02em</span></div>
  <div class="h2">Sample evidence <span class="tag">h2 · 17px bold</span></div>
</body>
</html>
