<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4px base rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-0); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--accent); border-radius: 3px; width: 22px; box-shadow: 0 0 14px rgba(255,255,255,0.25); }
  .n { font: 11px var(--font-mono); color: var(--text-secondary); }
  .px { font: 10px var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="step"><span class="bar" style="height:4px"></span><span class="n">1</span><span class="px">4</span></div>
    <div class="step"><span class="bar" style="height:8px"></span><span class="n">2</span><span class="px">8</span></div>
    <div class="step"><span class="bar" style="height:12px"></span><span class="n">3</span><span class="px">12</span></div>
    <div class="step"><span class="bar" style="height:16px"></span><span class="n">4</span><span class="px">16</span></div>
    <div class="step"><span class="bar" style="height:20px"></span><span class="n">5</span><span class="px">20</span></div>
    <div class="step"><span class="bar" style="height:24px"></span><span class="n">6</span><span class="px">24</span></div>
    <div class="step"><span class="bar" style="height:32px"></span><span class="n">8</span><span class="px">32</span></div>
    <div class="step"><span class="bar" style="height:40px"></span><span class="n">10</span><span class="px">40</span></div>
    <div class="step"><span class="bar" style="height:48px"></span><span class="n">12</span><span class="px">48</span></div>
    <div class="step"><span class="bar" style="height:64px"></span><span class="n">16</span><span class="px">64</span></div>
  </div>
</body>
</html>
