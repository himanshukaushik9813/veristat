<!-- @dsCard group="Brand" viewport="700x150" name="Logomark & Wordmark" subtitle="Shield-check mark + VERISTAT logotype" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-0); display: flex; align-items: center; gap: 40px; }
  .logo { display: inline-flex; align-items: center; gap: 12px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.28)); }
  .wordmark { font: 800 26px var(--font-sans); letter-spacing: 0.14em; color: var(--text-primary); }
  .mark-only { filter: drop-shadow(0 0 12px rgba(255,255,255,0.32)); }
  .lbl { font: 11px var(--font-mono); color: var(--text-muted); margin-top: 10px; }
  .stack { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="stack">
    <div class="logo">
      <svg width="38" height="38" viewBox="0 0 26 26" fill="none" aria-hidden>
        <path d="M13 1.5 22.5 6v7.2c0 5.4-3.9 9.4-9.5 11.3C7.4 22.6 3.5 18.6 3.5 13.2V6L13 1.5Z" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
        <path d="M8.8 13.2l2.9 2.9 5.5-5.9" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="wordmark">VERISTAT</span>
    </div>
    <span class="lbl">lockup · logomark + wordmark</span>
  </div>
  <div class="stack">
    <svg class="mark-only" width="56" height="56" viewBox="0 0 26 26" fill="none" aria-hidden>
      <path d="M13 1.5 22.5 6v7.2c0 5.4-3.9 9.4-9.5 11.3C7.4 22.6 3.5 18.6 3.5 13.2V6L13 1.5Z" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
      <path d="M8.8 13.2l2.9 2.9 5.5-5.9" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="lbl">mark · shield + check</span>
  </div>
</body>
</html>
