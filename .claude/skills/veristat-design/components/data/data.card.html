<!-- @dsCard group="Components" viewport="700x400" name="Data Display" subtitle="Stat card · KPIs · dimensions · charts · incident · evidence · badge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--surface-0); }
  .cols { display: grid; grid-template-columns: 240px 1fr; gap: 20px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .panel { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  h4 { font: 12px var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin: 0 0 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const NS = window.VeristatDesignSystem_aac6ad;
  const { StatCard, KpiCard, DimensionMeter, Sparkline, TrendArea, IncidentCard, EvidenceRow, EvidenceKV, ScoreBadge, GradeChip, VerdictChip, TxLink } = NS;
  const series = [40,52,48,63,58,71,69,80,77,86,90,94];
  const SearchIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21" strokeWidth="2.2"/></svg>);
  ReactDOM.createRoot(document.getElementById("root")).render(
    <div className="cols">
      <div className="stack">
        <StatCard icon={<SearchIcon />} label="Paid Probes" value="1,284" caption="On-chain payments" delta="+124 today" color="var(--accent)" chart={<TrendArea values={series} id="probes" />} />
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <ScoreBadge score={94} /><ScoreBadge score={51} />
        </div>
      </div>
      <div className="stack">
        <div className="kpis">
          <KpiCard label="Composite"><GradeChip grade="A" /> 94.3</KpiCard>
          <KpiCard label="Confidence" value="88%" sub="12 verdicts" />
          <KpiCard label="Trend"><Sparkline values={series} width={120} height={30} /></KpiCard>
        </div>
        <div className="panel">
          <h4>Dimensions</h4>
          <DimensionMeter name="Accuracy" value={96} />
          <DimensionMeter name="Reliability" value={88} />
          <DimensionMeter name="Integrity" value={40} color="var(--critical)" />
          <DimensionMeter name="Freshness" value={null} />
        </div>
        <IncidentCard kind="OVERCHARGE" time="2025-07-06T10:14:00Z" summary="quoted $0.0010 but charged $0.0030 (on-chain Transfer event)" />
        <EvidenceRow open summary={<>#42 · defi.token-meta · <VerdictChip verdict="pass" dimension="acc" abbrev /> <VerdictChip verdict="fail" dimension="int" abbrev /></>}>
          <EvidenceKV label="payment tx"><TxLink hash="0x2d4022f1a9c3e0b7" href="#" /></EvidenceKV>
          <EvidenceKV label="quoted / charged">$0.0010 / $0.0030</EvidenceKV>
        </EvidenceRow>
      </div>
    </div>
  );
</script>
</body>
</html>
